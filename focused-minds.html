<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#F5F9FF;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:360px;
height:640px;
background:white;
border-radius:24px;
box-shadow:0 20px 40px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
overflow:hidden;
}

.top{
padding:20px;
text-align:center;
font-weight:600;
}

.circle{
width:140px;
height:140px;
border-radius:50%;
background:#6FA8DC;
margin:40px auto;
transition:4s ease-in-out;
}

.text{
text-align:center;
color:#6B7280;
}

.btn{
margin:20px auto;
padding:12px 24px;
border:none;
border-radius:20px;
background:#6FA8DC;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">
<div class="top">Day 1 • Focus</div>

<div class="circle" id="c"></div>
<div class="text" id="t">Tap to begin</div>

<button class="btn" onclick="start()">Start Session</button>
</div>

<script>
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.9;
speechSynthesis.speak(msg);
}

function start(){
let c=document.getElementById("c");
let t=document.getElementById("t");

t.innerText="Inhale...";
c.style.transform="scale(1.5)";
speak("Breathe in slowly");

setTimeout(()=>{
t.innerText="Exhale...";
c.style.transform="scale(1)";
speak("And breathe out");
},4000);
}
</script>

</body>
</html>
